name: Bug report
description: Create a report to help OpenVue improve.
title: 'Bug: '
labels:
  - 'Status: Needs Triage'
body:
  - type: markdown
    attributes:
      value: >
        OpenVue is maintained by a small team of volunteers. A clear
        reproducer and complete environment info help us triage much faster
        — issues without them may take a while to get to. Have a fix in
        mind? PRs are welcome, see the field below. For questions or support,
        please use [GitHub Discussions](https://github.com/openvi-foundation/openvue/discussions)
        instead of opening an issue.
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the report is about.
      value: |
        **What happened?**


        **Additional context**
        <!-- Screenshots, logs, or anything else that might help -->
    validations:
      required: true
  - type: input
    id: reproducer
    attributes:
      label: Reproducer
      placeholder: 'https://stackblitz.com/edit/...'
      description: >-
        A link to a minimal reproduction of the bug. Issues without a
        reproducer take much longer to triage.
    validations:
      required: true
  - type: textarea
    id: reproduce-steps
    attributes:
      label: Steps to reproduce the behavior
      description: A clear and concise description of how to make the issue happen.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true
  - type: input
    id: openvue-version
    attributes:
      label: OpenVue version
      placeholder: x.x.x
    validations:
      required: true
  - type: input
    id: pr-version
    attributes:
      label: Vue version
      placeholder: x.x.x
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node version
      placeholder: x.x.x
    validations:
      required: false
  - type: input
    id: browsers
    attributes:
      label: Browser(s)
      description: >-
        List specific browser(s) the problem occurs on or leave blank if ALL
        browsers
      placeholder: |
        e.g. Safari 15, iOS 15.4, Chrome 90
  - type: markdown
    attributes:
      value: '---'
  - type: input
    id: pull_request
    attributes:
      label: Pull Request Link
      description: Link to your pull request, if you have one.
    validations:
      required: false
  - type: checkboxes
    id: reason_for_no_pr
    attributes:
      label: Reason for not contributing a PR
      options:
        - label: Lack of time
        - label: Unsure how to implement the fix/feature
        - label: Difficulty understanding the codebase
        - label: Other
    validations:
      required: false
  - type: textarea
    id: pr_other
    attributes:
      label: Other Reason
      description: >-
        If your answer to the previous question is "Other", please explain the
        reason.
    validations:
      required: false
