name: Consumer Contracts

on:
    pull_request:
    workflow_dispatch:

permissions:
    contents: read

jobs:
    package-artifacts:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
            - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
              with:
                  version: 9.6.0
            - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
              with:
                  node-version: 20
                  cache: pnpm
            - run: pnpm install --frozen-lockfile
            - name: Verify migration contracts
              run: pnpm --filter migrate test:unit
            - name: Build and pack local packages
              run: pnpm run test:artifacts:pack
              env:
                  OPENVUE_TEST_ARTIFACTS: test-artifacts
            - name: Verify package surfaces
              run: pnpm run verify:dist && node scripts/verify-package-contracts.mjs
            - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
              with:
                  name: openvue-test-artifacts
                  path: test-artifacts
                  if-no-files-found: error

    consumers:
        needs: package-artifacts
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                fixture: [vite-manual, vite-auto-import, nuxt, laravel-vite, laravel-inertia, volt]
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
            - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
              with:
                  version: 9.6.0
            - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
              with:
                  node-version: 20
                  cache: pnpm
            - name: Set up PHP for Laravel
              if: startsWith(matrix.fixture, 'laravel-')
              uses: shivammathur/setup-php@b604ade2a87db23f8871b7182e69ec5e75effb45 # v2
              with:
                  php-version: '8.2'
                  tools: composer:v2
                  coverage: none
            - run: pnpm install --frozen-lockfile
            - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
              with:
                  name: openvue-test-artifacts
                  path: test-artifacts
            - name: Install Chromium
              run: pnpm exec playwright install --with-deps chromium
            - name: Migrate, typecheck, build, and smoke ${{ matrix.fixture }}
              run: node scripts/run-consumer-tests.mjs ${{ matrix.fixture }} --skip-package-build --browser
              env:
                  OPENVUE_TEST_ARTIFACTS: test-artifacts
